<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interaction Card B</title>
  <link rel="stylesheet" href="./interaction-toast.css">
</head>
<body>
  <main class="artboard">
    <div class="label">
      <strong>Option B: Compact Method Cycler</strong>
      Keeps the toast quiet: Enter collects, Tab changes the shown method.
    </div>

    <section class="toast" aria-label="interaction card option B">
      <div class="toast-inner">
        <div class="top-row">
          <div class="target">
            <div class="target-name">Volcanic Shore Barnacle</div>
            <div class="status">Field note saved.</div>
          </div>
          <button class="collect" type="button">
            <span class="key">Enter</span>
            <strong>Collect</strong>
          </button>
        </div>

        <div class="carousel-row">
          <div class="cycle">
            <span class="tab-key">Tab</span>
            <span>Change method</span>
          </div>
          <div class="method-pill" aria-label="current collection method">
            <span class="tool">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8.5 11.5 V5.6 C8.5 4.8 9.1 4.2 9.9 4.2 C10.7 4.2 11.3 4.8 11.3 5.6 V10.4" />
                <path d="M11.3 10 V4.6 C11.3 3.8 11.9 3.2 12.7 3.2 C13.5 3.2 14.1 3.8 14.1 4.6 V10.2" />
                <path d="M14.1 10.2 V5.8 C14.1 5 14.7 4.4 15.5 4.4 C16.3 4.4 16.9 5 16.9 5.8 V12.6" />
                <path d="M16.9 12 C17.4 10.8 18.4 10.3 19.2 10.9 C19.9 11.4 19.9 12.4 19.3 13.6 L17 18.2 C16 20 14.4 20.9 12.4 20.9 C9.1 20.9 7.5 19.3 6.4 16.4 L4.9 12.6 C4.5 11.6 4.9 10.8 5.7 10.5 C6.5 10.2 7.3 10.6 7.7 11.5 L8.5 13.4" />
              </svg>
            </span>
            <strong>Bare Hands</strong>
          </div>
          <div class="hint-icons" aria-hidden="true">
            <span class="tool"><img src="../public/inventory/geological_hammer.png" alt=""></span>
            <span class="tool"><img src="../public/inventory/twine.png" alt=""></span>
            <span class="tool"><img src="../public/inventory/butterfly_net.png" alt=""></span>
            <span class="tool"><img src="../public/inventory/shotgun.png" alt=""></span>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
