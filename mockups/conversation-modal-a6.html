<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversation Modal A6: Open Field Dispatch</title>
  <link rel="stylesheet" href="./conversation-modal.css">
  <style>
    :root { --sage: #557a76; --copper: #ac745a; --paper: #e4d9c3; }
    .open-dispatch {
      position: fixed;
      right: clamp(20px, 5vw, 86px);
      bottom: clamp(20px, 5vh, 58px);
      left: clamp(20px, 5vw, 86px);
      display: grid;
      grid-template-columns: 206px minmax(0, 1fr);
      max-width: 1160px;
      min-height: 388px;
      margin: auto;
      border-top: 3px solid var(--sage);
      border-bottom: 1px solid rgba(201,163,95,0.5);
      background: #101a27;
      box-shadow: 0 28px 76px rgba(0,0,0,0.64), inset 0 1px 0 rgba(234,223,199,0.1);
    }
    .open-dispatch::before { content: ""; position: absolute; inset: 8px; border: 1px solid rgba(201,163,95,0.12); pointer-events: none; }
    .speaker-rail {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 388px;
      padding: 0 21px 21px;
      border-right: 1px solid rgba(201,163,95,0.3);
      background: #1b2c35;
    }
    .shield-wrap { position: absolute; top: -49px; left: 50%; width: 148px; height: 194px; transform: translateX(-50%); }
    .shield-wrap::before { content: ""; position: absolute; top: 10px; left: -56px; width: 255px; height: 3px; background: var(--sage); box-shadow: 0 0 0 1px rgba(104,137,128,0.19); }
    .speaker-rail .portrait {
      position: absolute;
      top: 0;
      left: 9px;
      width: 130px;
      height: 178px;
      border: 5px solid var(--paper);
      border-radius: 1px 1px 64px 64px;
      background: #d9cfb9;
      box-shadow: 0 13px 27px rgba(0,0,0,0.4), inset 0 0 0 1px #7e6a4f;
    }
    .speaker-rail .portrait::after { border: 0; }
    .speaker-rail .role { margin: 0 0 8px; color: var(--paper); font-family: var(--lora); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; }
    .speaker-rail h1 { margin: 0; color: #f5ead3; font-size: 28px; font-weight: 500; line-height: 0.9; }
    .conversation-body { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr auto; min-width: 0; padding: 20px 32px 18px; }
    .close-row { display: flex; justify-content: flex-end; min-height: 23px; border-bottom: 1px solid rgba(201,163,95,0.22); }
    .close-row button { align-self: start; padding: 0; border: 0; background: transparent; color: var(--faded); font-family: var(--lora); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
    .close-row button:hover, .close-row button:focus-visible { color: var(--gold-light); outline: none; }
    .speech { align-self: center; max-width: 790px; padding: 18px 0 15px; }
    .speech .stage-direction { margin: 0 0 9px; color: #b9ae94; font-family: var(--lora); font-size: 12px; font-style: italic; line-height: 1.4; }
    .speech p { margin: 0; color: #f5ebd5; font-size: 21px; font-weight: 500; line-height: 1.34; }
    .answers { display: grid; grid-template-columns: minmax(0, 1fr) minmax(245px, 0.9fr); gap: 17px 24px; border-top: 1px solid rgba(201,163,95,0.28); padding-top: 13px; }
    .quick-replies { display: grid; gap: 1px; }
    .quick-replies .choice { grid-template-columns: 28px 1fr; min-height: 43px; padding: 8px 5px; border: 0; border-bottom: 1px solid rgba(201,163,95,0.19); border-radius: 0; background: transparent; font-size: 16px; }
    .quick-replies .choice:hover, .quick-replies .choice:focus-visible, .quick-replies .choice.selected { padding-left: 10px; background: rgba(85,122,118,0.16); color: #fff2d9; box-shadow: inset 3px 0 0 var(--copper); }
    .quick-replies .choice-number { color: var(--copper); }
    .freeform { display: grid; align-content: end; gap: 6px; }
    .freeform label { color: var(--paper); font-family: var(--lora); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; }
    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .input-row input { min-width: 0; height: 39px; border: 1px solid rgba(201,163,95,0.52); border-radius: 2px; background: rgba(228,217,195,0.97); padding: 0 11px; color: #2d291f; font-family: var(--garamond); font-size: 17px; outline: none; }
    .input-row input:focus { border-color: var(--gold-light); box-shadow: 0 0 0 2px rgba(227,197,133,0.16); }
    .input-row input::placeholder { color: #7d715d; font-style: italic; }
    .input-row button { min-width: 69px; border: 1px solid rgba(227,197,133,0.65); border-radius: 2px; background: rgba(85,122,118,0.31); color: var(--paper); font-family: var(--lora); font-size: 9px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; }
    .input-row button:hover, .input-row button:focus-visible { background: rgba(85,122,118,0.5); outline: none; }
    .keyboard { position: absolute; right: 32px; bottom: -23px; color: rgba(234,223,199,0.62); font-family: var(--lora); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
    @media (max-width: 760px) {
      .open-dispatch { grid-template-columns: 150px minmax(0, 1fr); min-height: 410px; }
      .speaker-rail { min-height: 410px; padding: 0 14px 18px; }
      .shield-wrap { transform: translateX(-50%) scale(0.81); transform-origin: top center; }
      .speaker-rail h1 { font-size: 21px; }
      .conversation-body { padding: 17px 19px; }
      .answers { grid-template-columns: 1fr; gap: 11px; }
    }
    @media (max-width: 510px) {
      .open-dispatch { right: 10px; bottom: 11px; left: 10px; grid-template-columns: 1fr; min-height: 0; }
      .speaker-rail { display: grid; grid-template-columns: 72px 1fr; column-gap: 10px; align-items: center; min-height: 77px; padding: 10px 15px; border-right: 0; border-bottom: 1px solid rgba(201,163,95,0.3); }
      .shield-wrap { position: static; width: 61px; height: 61px; transform: none; }
      .shield-wrap::before { display: none; }
      .speaker-rail .portrait { top: 0; left: 0; width: 61px; height: 61px; border-width: 3px; border-radius: 50%; }
      .speaker-rail .role { display: none; }
      .speaker-rail h1 { font-size: 19px; }
      .conversation-body { padding: 13px 15px; }
      .speech { padding: 13px 0; }
      .speech p { font-size: 19px; line-height: 1.31; }
      .input-row input { font-size: 16px; }
      .keyboard { display: none; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>
  <div class="veil" aria-hidden="true"></div>
  <div class="screen-note"><strong>Post Office Bay</strong> &nbsp;•&nbsp; open dialogue variant</div>
  <main class="open-dispatch" aria-label="Conversation with Syms Covington">
    <aside class="speaker-rail">
      <div class="shield-wrap"><div class="portrait"><img src="../public/portraits/syms_covington.jpg" alt="Syms Covington"></div></div>
      <div>
        <p class="role">Your assistant</p>
        <h1>Syms<br>Covington</h1>
      </div>
    </aside>
    <section class="conversation-body">
      <header class="close-row"><button type="button">Close <span class="key">Esc</span></button></header>
      <div class="speech">
        <p class="stage-direction">Syms kneels beside the gull, holding its damaged wing clear of the sand.</p>
        <p>“It is a handsome bird, sir. A shame about the wing. Shall I put it in the case, or keep it out for your notes?”</p>
      </div>
      <div class="answers">
        <div class="quick-replies" aria-label="Quick replies">
          <button class="choice selected" type="button"><span class="choice-number">I.</span><span>Label it for the collection.</span></button>
          <button class="choice" type="button"><span class="choice-number">II.</span><span>What did you notice before it fell?</span></button>
        </div>
        <form class="freeform">
          <label for="reply">Or say something else</label>
          <div class="input-row">
            <input id="reply" type="text" placeholder="Ask Syms a question..." aria-label="Your reply to Syms">
            <button type="submit">Speak</button>
          </div>
        </form>
      </div>
    </section>
    <div class="keyboard"><span class="key">1–2</span> quick reply &nbsp; <span class="key">Enter</span> speak</div>
  </main>
  <script>
    const choices = [...document.querySelectorAll('.choice')];
    choices.forEach(choice => choice.addEventListener('click', () => { choices.forEach(item => item.classList.remove('selected')); choice.classList.add('selected'); }));
    document.querySelector('.freeform').addEventListener('submit', event => event.preventDefault());
  </script>
</body>
</html>
