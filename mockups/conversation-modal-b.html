<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversation Modal B: Field Conversation</title>
  <link rel="stylesheet" href="./conversation-modal.css">
  <style>
    .field-conversation {
      position: fixed;
      right: clamp(16px, 5vw, 82px);
      bottom: clamp(16px, 4vh, 44px);
      left: clamp(16px, 5vw, 82px);
      display: grid;
      grid-template-columns: minmax(112px, 148px) minmax(0, 1fr);
      gap: 20px;
      max-width: 1140px;
      margin: auto;
      padding: 18px 21px 17px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 46%),
        rgba(11, 19, 33, 0.95);
      box-shadow: 0 20px 62px rgba(0,0,0,0.63), inset 0 1px 0 rgba(227,197,133,0.13);
    }
    .field-conversation::before { content: ""; position: absolute; inset: 7px; border: 1px solid rgba(201,163,95,0.13); border-radius: 3px; pointer-events: none; }
    .speaker-card { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding-top: 5px; text-align: center; }
    .speaker-card .portrait { width: 110px; height: 128px; }
    .speaker-card h1 { margin: 10px 0 1px; font-size: 17px; font-weight: 600; line-height: 1; }
    .speaker-card p { margin: 0; color: var(--faded); font-family: var(--lora); font-size: 9px; letter-spacing: 0.11em; text-transform: uppercase; }
    .dialogue { position: relative; z-index: 1; min-width: 0; }
    .head { display: flex; align-items: center; justify-content: space-between; gap: 16px; min-height: 24px; border-bottom: 1px solid rgba(201,163,95,0.22); color: var(--gold); font-family: var(--lora); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
    .head button { padding: 0; border: 0; background: transparent; color: var(--faded); font-family: var(--lora); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
    .head button:hover, .head button:focus-visible { color: var(--gold-light); outline: none; }
    .scene-description { margin: 12px 0 5px; color: var(--faded); font-family: var(--lora); font-size: 12px; font-style: italic; line-height: 1.4; }
    .spoken { margin: 0 0 12px; color: var(--parchment); font-size: 22px; line-height: 1.18; }
    .choices { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; }
    .choices .choice { grid-template-columns: 19px 1fr; min-height: 54px; padding: 8px 10px; font-size: 15px; }
    .reply { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(201,163,95,0.18); }
    .reply input { min-width: 0; height: 36px; border: 1px solid rgba(201,163,95,0.42); border-radius: 3px; background: rgba(232,220,192,0.94); padding: 0 11px; color: #2d2618; font-family: var(--garamond); font-size: 16px; outline: none; }
    .reply input:focus { border-color: var(--gold-light); box-shadow: 0 0 0 2px rgba(227,197,133,0.16); }
    .reply input::placeholder { color: #84745a; font-style: italic; }
    .speak { min-width: 76px; border: 1px solid rgba(227,197,133,0.64); border-radius: 3px; background: rgba(201,163,95,0.16); color: var(--gold-light); font-family: var(--lora); font-size: 10px; letter-spacing: 0.11em; text-transform: uppercase; }
    .speak:hover, .speak:focus-visible { background: rgba(201,163,95,0.28); outline: none; }
    .hint { margin: 7px 0 0; color: rgba(169,155,128,0.76); font-family: var(--lora); font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; }
    @media (max-width: 760px) {
      .field-conversation { grid-template-columns: 74px minmax(0,1fr); gap: 13px; padding: 14px; }
      .speaker-card .portrait { width: 66px; height: 84px; }
      .speaker-card h1 { font-size: 13px; }
      .speaker-card p { display: none; }
      .spoken { font-size: 19px; }
      .choices { grid-template-columns: 1fr; }
      .choices .choice { min-height: 42px; }
    }
    @media (max-width: 470px) {
      .field-conversation { right: 10px; bottom: 10px; left: 10px; grid-template-columns: 1fr; }
      .speaker-card { display: grid; grid-template-columns: 52px 1fr; column-gap: 10px; align-items: center; text-align: left; }
      .speaker-card .portrait { grid-row: span 2; width: 52px; height: 58px; }
      .speaker-card h1 { margin: 0; }
      .speaker-card p { display: block; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>
  <div class="veil" aria-hidden="true"></div>
  <div class="screen-note"><strong>Post Office Bay</strong> &nbsp;•&nbsp; conversation mockup B</div>

  <main class="field-conversation" aria-label="Field conversation with Syms Covington">
    <aside class="speaker-card">
      <div class="portrait"><img src="../public/portraits/syms_covington.jpg" alt="Syms Covington"></div>
      <h1>Syms Covington</h1>
      <p>Assistant</p>
    </aside>

    <section class="dialogue">
      <header class="head">
        <span>Conversation</span>
        <button type="button">Close <span class="key">Esc</span></button>
      </header>
      <p class="scene-description">Syms brushes sand from the gull’s feet and reaches for a label.</p>
      <p class="spoken">“It is a handsome bird, sir. A shame about the wing.”</p>
      <div class="choices" aria-label="Conversation replies">
        <button class="choice selected" type="button"><span class="choice-number">1</span><span>Label it for the collection.</span></button>
        <button class="choice" type="button"><span class="choice-number">2</span><span>What did you notice before it fell?</span></button>
        <button class="choice" type="button"><span class="choice-number">3</span><span>Keep it outside the case for now.</span></button>
      </div>
      <form class="reply">
        <input aria-label="Your reply to Syms" type="text" placeholder="Ask Syms a question...">
        <button class="speak" type="submit">Speak</button>
      </form>
      <p class="hint"><span class="key">1–3</span> quick reply &nbsp;•&nbsp; dialogue is recorded in the journal</p>
    </section>
  </main>

  <script>
    const choices = [...document.querySelectorAll('.choice')];
    choices.forEach(choice => choice.addEventListener('click', () => {
      choices.forEach(item => item.classList.remove('selected'));
      choice.classList.add('selected');
    }));
    document.querySelector('.reply').addEventListener('submit', event => event.preventDefault());
  </script>
</body>
</html>
