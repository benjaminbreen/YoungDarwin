<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversation Modal A7: Minimal Field Dialogue</title>
  <link rel="stylesheet" href="./conversation-modal.css">
  <style>
    :root { --sea: #527b77; --copper: #a96f54; --paper: #e7ddc9; }
    .dialogue-panel {
      position: fixed;
      right: clamp(18px, 5vw, 84px);
      bottom: clamp(18px, 5vh, 56px);
      left: clamp(18px, 5vw, 84px);
      display: grid;
      grid-template-columns: 212px minmax(0, 1fr);
      max-width: 1160px;
      min-height: 408px;
      margin: auto;
      border: 1px solid rgba(201,163,95,0.42);
      background: #101a27;
      box-shadow: 0 28px 76px rgba(0,0,0,0.66), inset 0 1px 0 rgba(234,223,199,0.08);
    }
    .speaker {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 21px 25px;
      border-right: 1px solid rgba(201,163,95,0.24);
      background: #1d3038;
    }
    .speaker .portrait {
      position: absolute;
      top: -49px;
      left: 50%;
      width: 134px;
      height: 181px;
      transform: translateX(-50%);
      border: 5px solid var(--paper);
      border-radius: 1px 1px 67px 67px;
      background: #d9cfb9;
      box-shadow: 0 14px 29px rgba(0,0,0,0.43), inset 0 0 0 1px #7e6a4f;
    }
    .speaker .portrait::after { border: 0; }
    .speaker h1 { margin: 0; color: #f4ead4; font-size: 28px; font-weight: 500; line-height: 0.9; }
    .dialogue { position: relative; z-index: 1; display: grid; grid-template-rows: minmax(0, 1fr) auto; min-width: 0; padding: 31px 34px 20px; }
    .spoken { align-self: center; max-width: 815px; padding: 0 0 27px; }
    .spoken p { margin: 0; color: #f5ebd7; font-size: 21px; font-weight: 500; line-height: 1.37; }
    .spoken p + p { margin-top: 9px; }
    .replies { display: grid; gap: 1px; max-width: 815px; }
    .choice {
      grid-template-columns: 36px 1fr;
      min-height: 49px;
      padding: 10px 4px;
      border: 0;
      border-top: 1px solid rgba(201,163,95,0.25);
      border-radius: 0;
      background: transparent;
      font-size: 17px;
    }
    .choice:hover, .choice:focus-visible, .choice.selected {
      padding-left: 10px;
      background: rgba(82,123,119,0.15);
      color: #fff2db;
      box-shadow: inset 3px 0 0 var(--copper);
      outline: none;
    }
    .choice-number { color: var(--copper); }
    .reply-form { position: relative; margin-top: 10px; }
    .reply-form input {
      width: 100%;
      height: 48px;
      border: 1px solid rgba(201,163,95,0.48);
      border-radius: 2px;
      background: rgba(231,221,201,0.98);
      padding: 0 55px 0 14px;
      color: #2d291f;
      font-family: var(--garamond);
      font-size: 18px;
      outline: none;
    }
    .reply-form input:focus { border-color: var(--gold-light); box-shadow: 0 0 0 2px rgba(227,197,133,0.16); }
    .reply-form input::placeholder { color: #867a65; font-style: italic; }
    .reply-form button {
      position: absolute;
      top: 4px;
      right: 4px;
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border: 0;
      border-left: 1px solid rgba(122,104,72,0.37);
      border-radius: 0;
      background: transparent;
      color: #665638;
      font-family: var(--lora);
      font-size: 18px;
      line-height: 1;
    }
    .reply-form button:hover, .reply-form button:focus-visible { color: #2e2618; background: rgba(169,111,84,0.12); outline: none; }
    @media (max-width: 740px) {
      .dialogue-panel { grid-template-columns: 158px minmax(0, 1fr); min-height: 420px; }
      .speaker { padding: 18px 15px 20px; }
      .speaker .portrait { width: 108px; height: 146px; top: -38px; }
      .speaker h1 { font-size: 22px; }
      .dialogue { padding: 24px 22px 17px; }
    }
    @media (max-width: 510px) {
      .dialogue-panel { right: 10px; bottom: 11px; left: 10px; grid-template-columns: 1fr; min-height: 0; }
      .speaker { display: grid; grid-template-columns: 74px 1fr; align-items: center; min-height: 80px; padding: 10px 15px; border-right: 0; border-bottom: 1px solid rgba(201,163,95,0.24); }
      .speaker .portrait { position: static; width: 61px; height: 61px; transform: none; border-width: 3px; border-radius: 50%; }
      .speaker h1 { font-size: 20px; }
      .dialogue { padding: 18px 15px 15px; }
      .spoken { padding-bottom: 18px; }
      .spoken p { font-size: 19px; line-height: 1.34; }
      .choice { min-height: 43px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>
  <div class="veil" aria-hidden="true"></div>
  <main class="dialogue-panel" aria-label="Conversation with Syms Covington">
    <aside class="speaker">
      <div class="portrait"><img src="../public/portraits/syms_covington.jpg" alt="Syms Covington"></div>
      <h1>Syms<br>Covington</h1>
    </aside>
    <section class="dialogue">
      <div class="spoken">
        <p>“It is a handsome bird, sir. A shame about the wing. I have kept the feathers clear of the sand, but it will not travel well unless we decide what to do with it.”</p>
        <p>“Would you like it labelled now, or should I leave it out for your notes?”</p>
      </div>
      <div class="replies" aria-label="Conversation replies">
        <button class="choice selected" type="button"><span class="choice-number">I.</span><span>Label it for the collection.</span></button>
        <button class="choice" type="button"><span class="choice-number">II.</span><span>What did you notice before it fell?</span></button>
        <form class="reply-form">
          <input type="text" aria-label="Your reply to Syms" placeholder="Say something else...">
          <button type="submit" aria-label="Speak to Syms" title="Speak">↵</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    const choices = [...document.querySelectorAll('.choice')];
    choices.forEach(choice => choice.addEventListener('click', () => { choices.forEach(item => item.classList.remove('selected')); choice.classList.add('selected'); }));
    document.querySelector('.reply-form').addEventListener('submit', event => event.preventDefault());
  </script>
</body>
</html>
